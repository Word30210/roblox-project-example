name: size-label
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  size-label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply size label
        uses: "pascalgn/size-label-action@v0.5.7"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          IGNORED: |
            **/*.lock
            **/*.lock.*
            **/*_packages/**
            **/dist/**